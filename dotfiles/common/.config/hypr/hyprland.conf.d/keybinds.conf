###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, M, exit,
bind = $mainMod, M, exec, wlogout
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, B, exec, $webBrowser
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, T, exec, subl

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, ampersand, workspace, 1
bind = $mainMod, eacute, workspace, 2
bind = $mainMod, quotedbl, workspace, 3
bind = $mainMod, apostrophe, workspace, 4
bind = $mainMod, parenleft, workspace, 5
bind = $mainMod, minus, workspace, 6
bind = $mainMod, egrave, workspace, 7
bind = $mainMod, underscore, workspace, 8
bind = $mainMod, ccedilla, workspace, 9
bind = $mainMod, agrave, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod CTRL, ampersand, movetoworkspace, 1
bind = $mainMod CTRL, eacute, movetoworkspace, 2
bind = $mainMod CTRL, quotedbl, movetoworkspace, 3
bind = $mainMod CTRL, apostrophe, movetoworkspace, 4
bind = $mainMod CTRL, parenleft, movetoworkspace, 5
bind = $mainMod CTRL, minus, movetoworkspace, 6
bind = $mainMod CTRL, egrave, movetoworkspace, 7
bind = $mainMod CTRL, underscore, movetoworkspace, 8
bind = $mainMod CTRL, ccedilla, movetoworkspace, 9
bind = $mainMod CTRL, agrave, movetoworkspace, 10

# Brightness Control
bind = $mainMod, prior, exec, hyprctl hyprsunset gamma +10
bind = $mainMod, next, exec, hyprctl hyprsunset gamma -10
bind = $mainMod, home, exec, hyprctl hyprsunset gamma 100
bind = $mainMod SHIFT, prior, exec, hyprctl hyprsunset temperature +200
bind = $mainMod SHIFT, next, exec, hyprctl hyprsunset temperature -200
bind = $mainMod SHIFT, home, exec, hyprctl hyprsunset temperature 6500

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod CTRL, S, movetoworkspace, special:magic

# Screen capture
bind = $mainMod SHIFT, S, exec, hyprshot -z -m region --clipbard-only
bind = , PRINT, exec, hyprshot -m active -m output --clipboard-only

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod ALT, right, workspace, e+1
bind = $mainMod ALT, left, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle


# Requires playerctl
# DEFAULT
# bindl = , XF86AudioNext, exec, playerctl next
# bindl = , XF86AudioPause, exec, playerctl play-pause
# bindl = , XF86AudioPlay, exec, playerctl play-pause
# bindl = , XF86AudioPrev, exec, playerctl previous

# Custom playerctl controls
bind = $mainMod SHIFT, right, exec, playerctl next
bind = $mainMod SHIFT, left, exec, playerctl previous
bind = $mainMod SHIFT, down, exec, playerctl play-pause